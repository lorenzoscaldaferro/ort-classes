name: Vimeo Scraper

on:
  schedule:
    - cron: '0 23 * * 1-4'   # Mon-Thu 23:00 UTC = 20:00 UYT
  workflow_dispatch:            # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai notebooklm-mcp playwright

      - name: Install Chromium for Playwright
        run: python -m playwright install chromium --with-deps

      - name: Run scraper
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUBJECTS_JSON: ${{ secrets.SUBJECTS_JSON }}
          PYTHONUNBUFFERED: "1"
        run: python vimeo_scraper.py

      - name: Generate raw files for NotebookLM
        run: python generate_raw_files.py

      - name: Commit new transcripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ transcripts_index.json ui/public/raw/
          git diff --staged --quiet || git commit -m "chore: new transcripts $(date '+%Y-%m-%d')"
          git push

      - name: Sync sources in NotebookLM
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          NOTEBOOKLM_NOTEBOOK_IDS: ${{ secrets.NOTEBOOKLM_NOTEBOOK_IDS }}
          NETLIFY_URL: ${{ secrets.NETLIFY_URL }}
        run: python notebooklm_sync.py

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ ORT Scraper FALLÓ — $(date '+%Y-%m-%d %H:%M UTC'). Revisá GitHub Actions."
