name: Vimeo Scraper

on:
  schedule:
    - cron: '0 23 * * 1-4'   # Mon-Thu 23:00 UTC = 20:00 UYT
  workflow_dispatch:            # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 openai httpx playwright

      - name: Install Chromium for Playwright
        run: python -m playwright install chromium --with-deps

      - name: Run scraper
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUBJECTS_JSON: ${{ secrets.SUBJECTS_JSON }}
          PYTHONUNBUFFERED: "1"
        run: python vimeo_scraper.py

      - name: Generate raw files for NotebookLM
        run: python generate_raw_files.py

      - name: Commit new transcripts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/ transcripts_index.json ui/public/raw/
          git diff --staged --quiet || git commit -m "chore: new transcripts $(date '+%Y-%m-%d')"
          git push

      - name: Sync sources in NotebookLM
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          NOTEBOOKLM_NOTEBOOK_IDS: ${{ secrets.NOTEBOOKLM_NOTEBOOK_IDS }}
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
        run: python notebooklm_sync.py

      - name: Notify on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import json, os, urllib.request, urllib.parse

          token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          if not token or not chat_id:
              print("[notify] Telegram secrets not configured — skipping")
              raise SystemExit(0)

          try:
              with open('run_summary.json') as f:
                  summary = json.load(f)
              new_by_subject = summary.get('new_by_subject', {})
              total_new = summary.get('total_new', 0)
              warnings = summary.get('warnings', [])
              date = summary.get('date', 'hoy')
              if total_new:
                  parts = ', '.join(f"{s} +{n}" for s, n in new_by_subject.items() if n > 0)
                  body = f"Nuevas: {parts}"
              else:
                  body = "Sin clases nuevas hoy"
              if warnings:
                  reason_labels = {
                      'no_player_config': 'sin config',
                      'empty_text_tracks': 'sin captions',
                      'vtt_download_failed': 'error descarga',
                  }
                  warn_lines = []
                  for w in warnings:
                      label = reason_labels.get(w.get('reason', ''), w.get('reason', '?'))
                      warn_lines.append(f"  • {w.get('subject','?')} [{w.get('date','?')}]: {label}")
                  body += "\n⚠️ Videos sin transcripción:\n" + "\n".join(warn_lines)
              text = f"ORT Scraper - {date}\n{body}"
          except Exception as e:
              text = f"ORT Scraper completado ({e})"

          data = urllib.parse.urlencode({'chat_id': chat_id, 'text': text}).encode()
          urllib.request.urlopen(
              f"https://api.telegram.org/bot{token}/sendMessage", data
          )
          print(f"[notify] Sent: {text}")
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="ORT Scraper FALLO — $(date '+%Y-%m-%d %H:%M UTC'). Revisa GitHub Actions."
